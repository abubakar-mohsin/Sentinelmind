spring:
  profiles:
    active: mock
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: sentinelmind-default
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.sentinelmind.*"
  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
      password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:sentinelmind}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sentinelmind}
    username: ${SPRING_DATASOURCE_USERNAME:sentinelmind}
    password: ${SPRING_DATASOURCE_PASSWORD:sentinelmind}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: 8080

sentinelmind:
  confidence-threshold: 0.92
  react-max-iterations: 5

# Groq LLM configuration — used by GroqClient for real AI reasoning.
# api-key defaults to "not-set" when GROQ_API_KEY is not in the environment.
# The system works in full demo mode without a key; set it for live AI reasoning.
groq:
  api-key: ${GROQ_API_KEY:not-set}
  model: llama-3.3-70b-versatile
  base-url: https://api.groq.com/openai/v1
  max-tokens: 1024
  temperature: 0.1
