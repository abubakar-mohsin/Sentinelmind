server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Proxy /api/* → Spring Boot backend ──────────────────────────────────
    # In Docker, "backend" resolves to the sentinelmind-backend container.
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Proxy /ws → Spring Boot WebSocket (SockJS/STOMP) ────────────────────
    # Upgrade header required for WebSocket handshake.
    # proxy_read_timeout extended so long-lived WS connections aren't dropped.
    location /ws {
        proxy_pass          http://backend:8080/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_read_timeout  86400;
    }

    # ── React SPA — all unmatched routes return index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets aggressively ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
