# SentinelMind — Docker Compose
# Run with: docker compose up
# All services start with health checks. The backend waits for all dependencies.
# Default Spring profile is "mock" — no external API keys needed for the demo.

services:

  # ─────────────────────────────────────────────
  # Apache Kafka (event bus)
  # Using the KRaft mode image — no separate ZooKeeper needed
  # ─────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: sentinelmind-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # Use the Docker service name so OTHER containers (backend) can reach this broker.
      # "localhost" would resolve to the backend's own loopback — not Kafka.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168    # 7 days
    healthcheck:
      # kafka-topics.sh starts a JVM — on Windows Docker this can take >5 s.
      # timeout: 15s gives the JVM enough time to boot and get a response.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 12
      start_period: 30s
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ─────────────────────────────────────────────
  # Neo4j (knowledge graph)
  # Dashboard at http://localhost:7474  |  bolt://localhost:7687
  # Default credentials: neo4j / sentinelmind (set below)
  # ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: sentinelmind-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol (used by Spring Data Neo4j)
    environment:
      NEO4J_AUTH: neo4j/sentinelmind
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_max__size: 512m
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./seed:/seed    # seed Cypher files are accessible inside the container

  # ─────────────────────────────────────────────
  # PostgreSQL (audit log + incidents)
  # Credentials: sentinelmind / sentinelmind / db sentinelmind
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinelmind-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sentinelmind
      POSTGRES_USER: sentinelmind
      POSTGRES_PASSWORD: sentinelmind
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelmind -d sentinelmind"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─────────────────────────────────────────────
  # Redis (cache — optional for MVP)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: sentinelmind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # ─────────────────────────────────────────────
  # Spring Boot Backend
  # Waits for ALL infrastructure services to be healthy before starting.
  # Default Spring profile: mock (no external API keys needed)
  # To use real APIs: change SPRING_PROFILES_ACTIVE to "real"
  # ─────────────────────────────────────────────
  backend:
    extra_hosts:
    - "api.groq.com:172.64.149.20"
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelmind-backend
    ports:
      - "8080:8080"
    environment:
      # Spring profile — both MockThreatFeed and VirusTotalAdapter are now always
      # loaded regardless of profile. The dashboard toggle controls which one runs.
      SPRING_PROFILES_ACTIVE: mock

      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      # Neo4j
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: sentinelmind

      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentinelmind
      SPRING_DATASOURCE_USERNAME: sentinelmind
      SPRING_DATASOURCE_PASSWORD: sentinelmind

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      # LLM API (only used when SPRING_PROFILES_ACTIVE=real)
      LLM_API_KEY: ${LLM_API_KEY:-not-set}

      # Groq API — enables real AI reasoning in LlmStrategy and OrchestratorAgent.
      # Free keys at https://console.groq.com  |  Model: llama-3.3-70b-versatile
      # Works WITHOUT a key — the system falls back to rule-based logic automatically.
      GROQ_API_KEY: ${GROQ_API_KEY:-not-set}

      # VirusTotal (only used when SPRING_PROFILES_ACTIVE=real)
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-not-set}

      # Confidence threshold for the Orchestrator
      SENTINELMIND_CONFIDENCE_THRESHOLD: 0.92
      SENTINELMIND_REACT_MAX_ITERATIONS: 5

    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # wget is always present in the Alpine image; curl is not installed by default.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────
  # React SaaS Frontend (Landing + Login + Dashboard)
  # http://localhost:3001  →  nginx serves the CRA build
  # nginx proxies /api/* and /ws/* to the backend container.
  # No REACT_APP_WS_URL needed — the app uses relative URLs
  # which nginx forwards to backend:8080 internally.
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinelmind-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Neo4j Seed Runner (one-shot container)
  # Runs the Cypher seed scripts on first startup, then exits.
  # Uses a flag file to avoid re-seeding on every `docker compose up`.
  # ─────────────────────────────────────────────
  neo4j-seed:
    image: neo4j:5.18-community
    container_name: sentinelmind-neo4j-seed
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_ADDRESS: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: sentinelmind
    volumes:
      - ./seed:/seed
      - seed_flag:/seed_done
    command: >
      bash -c "
        if [ -f /seed_done/seeded ]; then
          echo 'Already seeded — skipping.';
          exit 0;
        fi;
        echo 'Running Neo4j seed scripts...';
        /var/lib/neo4j/bin/cypher-shell -a $$NEO4J_ADDRESS -u $$NEO4J_USER -p $$NEO4J_PASSWORD -f /seed/mitre_attack_seed.cypher;
        /var/lib/neo4j/bin/cypher-shell -a $$NEO4J_ADDRESS -u $$NEO4J_USER -p $$NEO4J_PASSWORD -f /seed/demo_entities.cypher;
        touch /seed_done/seeded;
        echo 'Seed complete.';
      "
    restart: "no"

# ─────────────────────────────────────────────
# Named volumes (persist data between restarts)
# ─────────────────────────────────────────────
volumes:
  kafka_data:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
  seed_flag:
